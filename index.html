    <section id ='nab-bar'></section>

    <div class="min-h-screen flex items-center justify-center bg-gray-100  rounded-sm shadow-md ">

  <div class="bg-white p-8 rounded shadow-md w-96 ">

    <h1 class="text-2xl font-semibold text-center "><i class="fa-brands fa-github"></i> GitHub Issues Tracker</h1>
    <p class="text-gray-500 text-center mb-6">Sign in to manage your Issues</p>

    <p>Username</p>
    <input id="username" type="text" placeholder="Enter Username"
      class="w-full border rounded-sm border-gray-300  p-2 mb-1">
      <span class=" text-blue-600">Dafult:admin</span>

    <p>Passward</p>
    <input id="password" type="password" placeholder="Password"
      class="w-full border rounded-sm border-gray-300 p-2 mb-1">
      <span class=" text-blue-600">Dafult:admin123</span>

    <button onclick="loginUser()"
      class="w-full bg-[#4A00FF] text-white p-2 mt-4 rounded">
      Sign In
    </button>

    <p class="text-sm mt-4 text-center">
      Demo: admin / admin123
    </p>

  </div>

</div>
