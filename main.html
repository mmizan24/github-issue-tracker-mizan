<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>


    <!-- Tailwind link establishment  -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisyUI link establishment  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />


    <!-- fontawesome cnd establishment  -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font link  -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Geist", sans-serif;

        }
    </style>
</head>

<body class=" mt-10 bg-gray-30 shadow-lg max-w-7xl mx-auto">

    <!-- Navbar -->
    <div class="flex justify-center w-full ">
        <nav
            class="flex justify-between items-center p-4 bg-white text-black shadow-md w-full max-w-7xl mx-auto rounded-lg mt-4 md:flex-row md:justify-between md:items-center">

            <h1 class="text-xl font-bold md:text-left">
                <i class="fa-brands fa-github"></i> GitHub Issue Tracker
            </h1>

            <div class="flex gap-2 sm:flex-row md:w-auto">
                <input id="searchInput"
                    class="border border-gray-300 rounded-md p-1 focus:outline-[#4A00FF] sm:w-auto md:w-auto"
                    placeholder="Search...">

                <button onclick="searchIssues()"
                    class="bg-[#4A00FF] text-white px-4 py-1 rounded-md md:w-auto md:flex-col">
                    Search
                </button>

                <button onclick="logout()" class="bg-red-500 text-white px-4 py-1 rounded-md">
            Logout
        </button>
            </div>

        </nav>
    </div>



    <!-- BTN Tabs with filtering the issue -->
    <div class="flex gap-2 p-5 max-w-6xl mx-auto shadow-md mt-10 mb-5 md:w-auto">

        <button onclick="filterIssues('all')" id="allBtn"
            class="tabBtn w-1/6  text-black rounded-md h-10 shadow-sm bg-blue-500">
            All
        </button>

        <button onclick="filterIssues('open')" id="openBtn" class="tabBtn w-1/6  rounded-md shadow-sm">
            Open
        </button>

        <button onclick="filterIssues('closed')" id="closedBtn" class="tabBtn w-1/6  rounded-md shadow-sm">
            Closed
        </button>

    </div>

    <!-- Banner  -->

    <div id="banner-conainer"
        class="max-w-6xl mx-auto flex flex-col md:flex-row md:justify-between items-center shadow-lg text-center p-6 md:p-10 gap-4">

        <!-- Issue Count -->
        <div class="flex gap-2 items-center">
            <img src="./assets/Aperture.png" alt="">
            <p class="text-xl md:text-2xl font-bold">
                <span id="count-issue">50</span> Issues
            </p>
        </div>

        <!-- Description -->
        <p class="text-sm md:text-base">
            Track and manage your project issues
        </p>

        <!-- Buttons -->
        <div class="flex gap-3 items-center">
            <img src="./assets/Open-Status.png" alt="">
            <button class="px-3 py-1 bg-green-500 text-white rounded">Open</button>

            <img src="./assets/Closed- Status .png" alt="">
            <button class="px-3 py-1 bg-purple-500 text-white rounded">Closed</button>
        </div>

        
    </div>

    


    <!-- for sppiner  -->

    <div id="spinner" class="text-center mt-10 hidden">

        <i class="fa-solid fa-spinner text-4xl text-blue-500 animate-spin"></i>

    </div>

    <!-- ISSUE GRID -->

    <div id="issueContainer" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 p-4">
    </div>



    <div id="modal" class="fixed inset-2 hidden  flex justify-center items-center shadow-2xl ">

        <div class="bg-gray-100 p-6 w-96 shadow- rounded-md ">
            <h2 id="modalTitle" class="text-xl font-bold"></h2>

            <div class="flex gap-2  mt-3 text-sm text-gray-600">

                <span id="label-one" class="bg-red-100 shadow-sm rounded-sm px-2 text-red-400"></i></span>

                <span id="label-two" class="bg-yellow-100 shadow-sm rounded-sm px-2 text-red-400"></span>

            </div>


            <p id="modalDescription" class="mt-3"></p>



            <button onclick="closeModal()" class="  bg-blue-500 text-white px-3 py-3 mt-4 rounded-md">
                Close
            </button>




        </div>

    </div>

    <script src="./js/api.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
